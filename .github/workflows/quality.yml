name: quality-gates

on:
  push:
  pull_request:

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Build page from partials
        run: npm run build
      - name: Run lint checks
        run: npm run lint
      - name: Lighthouse CI
        run: npm run lighthouse
